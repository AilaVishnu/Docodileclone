version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: docodile-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docodile}
      POSTGRES_USER: ${POSTGRES_USER:-docodile}
      # POSTGRES_PASSWORD must be set in the environment — no default is shipped.
      # Example: export POSTGRES_PASSWORD=<strong-random-password>
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
