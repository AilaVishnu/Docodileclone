# ─── Required environment variables (no defaults — app refuses to start if absent) ───
# JWT_SECRET          : HS256 signing key, min 32 chars (e.g. openssl rand -hex 32)
# POSTGRES_PASSWORD   : PostgreSQL password (set in docker-compose or runtime env)
#
# ─── Optional environment variables (defaults shown) ────────────────────────────────
# SPRING_DATASOURCE_URL     : jdbc:postgresql://localhost:5432/docodile?TimeZone=Asia/Kolkata
# SPRING_DATASOURCE_USERNAME: docodile
# SPRING_DATASOURCE_PASSWORD: (matches POSTGRES_PASSWORD)
# JWT_EXPIRATION_MS         : 3600000 (1 hour)
# FRONTEND_URL              : http://localhost:3000
# TOKEN_EXPIRY_HOURS        : 24 (password-reset link TTL)
# MAIL_HOST / MAIL_PORT / MAIL_USERNAME / MAIL_PASSWORD : SMTP credentials
# ALLOWED_ORIGINS           : comma-separated list of allowed CORS origins
# ────────────────────────────────────────────────────────────────────────────────────

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docodile?TimeZone=Asia/Kolkata}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:docodile}
    password: ${SPRING_DATASOURCE_PASSWORD:docodile}
  jpa:
    hibernate:
      ddl-auto: none
    # Off by default — logging every SQL statement is a heavy drag on bulk
    # operations (the HealthPlix import flushes tens of thousands of rows).
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      # Batch INSERT/UPDATE statements so bulk loads (e.g. the HealthPlix
      # data migration — thousands of rows) flush in grouped round-trips
      # instead of one statement per row.
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
      hibernate.order_updates: true
    defer-datasource-initialization: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
          auth: true

logging:
  level:
    org.flywaydb: INFO
    org.springframework.boot.autoconfigure.flyway: DEBUG

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  token-expiry-hours: ${TOKEN_EXPIRY_HOURS:24}

security:
  jwt:
    # JWT_SECRET must be set in the environment — no default is provided.
    # The application will refuse to start if this variable is absent or blank.
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
