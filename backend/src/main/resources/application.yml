spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/docodile}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:docodile}
    password: ${DB_PASSWORD:docodile}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:change-me}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
