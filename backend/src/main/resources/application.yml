spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/docodile}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:docodile}
    password: ${DB_PASSWORD:docodile}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.flywaydb: INFO
    org.springframework.boot.autoconfigure.flyway: DEBUG

security:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
