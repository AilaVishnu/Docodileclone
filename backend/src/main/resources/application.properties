spring.application.name=demo
# No profile by default → production runs the base application.yml (PHI encryption
# enforced, real SMTP). Local dev opts into the `local` profile via the bootRun task
# in build.gradle (or set SPRING_PROFILES_ACTIVE=local). Do NOT default to `local`
# here: that silently disabled file encryption and pointed mail at localhost in prod.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}

eka.client-id=${EKA_CLIENT_ID:}
eka.client-secret=${EKA_CLIENT_SECRET:}

# OpenAI — set OPENAI_API_KEY in the deployment env (Render / local).
# Model defaults to gpt-4o-mini for cost/speed; bump to gpt-4o if needed.
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
